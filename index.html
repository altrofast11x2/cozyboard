<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CozyBoard</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #fdfaf4;
      --surface2: #eee8d8;
      --border: #d4c9a8;
      --border-dark: #b0a07a;
      --text: #2a2218;
      --text-muted: #7a6e58;
      --accent: #c0392b;
      --accent2: #e74c3c;
      --ink: #1a1208;
      --shadow: rgba(42,34,24,0.12);
      --admin: #1a6e3a;
      --admin2: #27ae60;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; min-height: 100vh; background-image: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,160,100,0.13) 27px,rgba(180,160,100,0.13) 28px); }

    /* ── 헤더 ── */
    header { background: var(--ink); color: var(--bg); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px var(--shadow); }
    .logo { font-family:'Noto Serif KR',serif; font-size:1.4rem; font-weight:700; color:var(--bg); }
    .logo span { color: var(--accent2); }
    .header-right { display:flex; align-items:center; gap:0.8rem; }
    .user-info { font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:rgba(245,240,232,0.6); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .user-info.is-admin { color:#7dffaa; }
    .btn-hdr { background:none; border:1px solid rgba(245,240,232,0.25); color:rgba(245,240,232,0.8); padding:0.35rem 0.85rem; font-size:0.78rem; font-family:'Noto Sans KR',sans-serif; cursor:pointer; border-radius:2px; transition:border-color 0.2s,color 0.2s; white-space:nowrap; }
    .btn-hdr:hover { border-color:rgba(245,240,232,0.7); color:#fff; }
    .btn-hdr.accent { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn-hdr.accent:hover { background:var(--accent2); }
    .btn-hdr.danger { background:#7f0000; border-color:#b00000; color:#ffd0d0; }
    .btn-hdr.danger:hover { background:#b00000; }

    /* ── 관리자 배너 ── */
    .admin-banner { background:var(--admin); color:#d4ffdf; padding:0.5rem 1.5rem; font-family:'IBM Plex Mono',monospace; font-size:0.75rem; display:none; align-items:center; gap:0.6rem; }
    .admin-banner.show { display:flex; }
    .admin-dot { width:7px; height:7px; background:#7dffaa; border-radius:50%; animation:pulse 1.5s infinite; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .container { max-width:860px; margin:0 auto; padding:2.5rem 1.5rem; }

    /* ── 입력 ── */
    input, textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:0.65rem 0.85rem; font-family:'Noto Sans KR',sans-serif; font-size:0.88rem; color:var(--text); outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    input::placeholder, textarea::placeholder { color:var(--border-dark); }
    input:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(192,57,43,0.1); }
    textarea { resize:vertical; min-height:100px; line-height:1.7; }

    /* ── 오버레이 ── */
    .overlay { position:fixed; inset:0; background:rgba(26,18,8,0.65); display:flex; align-items:center; justify-content:center; z-index:200; padding:1rem; backdrop-filter:blur(2px); animation:fadeIn 0.2s ease both; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes modalUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    /* ── 인증 박스 ── */
    .auth-box { background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--accent); border-radius:2px; width:100%; max-width:400px; padding:2rem; box-shadow:0 20px 60px rgba(26,18,8,0.4); animation:modalUp 0.25s ease both; position:relative; }
    .auth-box h2 { font-family:'Noto Serif KR',serif; font-size:1.2rem; font-weight:700; color:var(--ink); margin-bottom:1.4rem; display:flex; align-items:center; gap:0.5rem; }
    .auth-box h2::before { content:''; display:inline-block; width:8px; height:8px; background:var(--accent); border-radius:50%; }
    .auth-close { position:absolute; top:1rem; right:1rem; background:none; border:none; color:var(--text-muted); font-size:1.1rem; cursor:pointer; }
    .auth-field { margin-bottom:0.8rem; }
    .auth-field label { display:block; font-size:0.78rem; color:var(--text-muted); margin-bottom:0.3rem; font-family:'IBM Plex Mono',monospace; }
    .auth-error { background:#fdf0ef; border:1px solid #f5c6c2; border-radius:2px; padding:0.6rem 0.8rem; font-size:0.8rem; color:var(--accent); margin-bottom:0.8rem; display:none; }
    .auth-submit { width:100%; margin-top:1rem; background:var(--accent); color:#fff; border:none; padding:0.75rem; font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; border-radius:2px; transition:background 0.2s; }
    .auth-submit:hover { background:var(--accent2); }
    .auth-submit:disabled { background:var(--border-dark); cursor:not-allowed; }
    .auth-switch { text-align:center; font-size:0.8rem; color:var(--text-muted); margin-top:1rem; }
    .auth-switch button { background:none; border:none; color:var(--accent); cursor:pointer; font-size:0.8rem; text-decoration:underline; font-family:'Noto Sans KR',sans-serif; }

    /* ── 글쓰기 박스 ── */
    .write-box { background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--accent); border-radius:2px; padding:1.5rem; margin-bottom:2.5rem; box-shadow:0 2px 12px var(--shadow); animation:slideDown 0.4s ease both; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
    .write-box h2 { font-family:'Noto Serif KR',serif; font-size:1rem; font-weight:600; color:var(--text-muted); margin-bottom:1.1rem; display:flex; align-items:center; gap:0.5rem; }
    .write-box h2::before { content:''; display:inline-block; width:8px; height:8px; background:var(--accent); border-radius:50%; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:0.7rem; margin-bottom:0.7rem; }
    @media(max-width:520px){ .row2{grid-template-columns:1fr;} }
    .field-row { margin-bottom:0.7rem; }
    .field-label { font-size:0.75rem; color:var(--text-muted); font-family:'IBM Plex Mono',monospace; margin-bottom:0.3rem; display:block; }
    .write-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; margin-top:0.8rem; }
    .write-hint { font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--text-muted); }
    .btn-submit { background:var(--accent); color:#fff; border:none; padding:0.7rem 1.8rem; font-family:'Noto Sans KR',sans-serif; font-size:0.88rem; font-weight:500; cursor:pointer; border-radius:2px; transition:background 0.2s,transform 0.1s; display:flex; align-items:center; gap:0.4rem; }
    .btn-submit:hover { background:var(--accent2); }
    .btn-submit:active { transform:scale(0.97); }
    .btn-submit:disabled { background:var(--border-dark); cursor:not-allowed; }

    /* ══ 드래그앤드롭 업로드 존 ══ */
    .drop-zone {
      border: 2px dashed var(--border-dark);
      border-radius: 4px;
      background: var(--bg);
      padding: 1.4rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(192,57,43,0.04);
    }
    .drop-zone.drag-over { border-style: solid; }
    .drop-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .drop-zone-icon { font-size:1.8rem; margin-bottom:0.4rem; }
    .drop-zone-text { font-size:0.83rem; color:var(--text-muted); font-family:'IBM Plex Mono',monospace; line-height:1.5; }
    .drop-zone-text strong { color:var(--accent); }
    .drop-zone-sub { font-size:0.72rem; color:var(--border-dark); margin-top:0.2rem; }

    /* ── 미리보기 스트립 ── */
    .img-preview-strip { display:flex; gap:0.6rem; flex-wrap:wrap; margin-top:0.7rem; }
    .img-thumb { position:relative; width:80px; height:80px; border-radius:3px; overflow:hidden; border:1px solid var(--border); flex-shrink:0; background:var(--surface2); }
    .img-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .img-thumb-del { position:absolute; top:3px; right:3px; background:rgba(26,18,8,0.78); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:0.65rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
    .img-thumb-del:hover { background:var(--accent); }
    .img-thumb-loading { position:absolute; inset:0; background:rgba(245,240,232,0.8); display:flex; align-items:center; justify-content:center; }
    .gif-badge { position:absolute; bottom:3px; left:3px; background:rgba(26,18,8,0.78); color:#7dffaa; font-family:'IBM Plex Mono',monospace; font-size:0.55rem; padding:0.1em 0.35em; border-radius:2px; pointer-events:none; font-weight:600; }
    .size-badge { position:absolute; bottom:3px; right:3px; background:rgba(26,18,8,0.65); color:rgba(245,240,232,0.9); font-family:'IBM Plex Mono',monospace; font-size:0.52rem; padding:0.1em 0.3em; border-radius:2px; pointer-events:none; }
    .img-count-label { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--text-muted); margin-top:0.4rem; }

    /* ── 목록 ── */
    .list-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:0.9rem; flex-wrap:wrap; gap:0.5rem; }
    .list-title { font-family:'Noto Serif KR',serif; font-size:1.1rem; font-weight:700; color:var(--ink); }
    .post-count { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--text-muted); }
    .post-list { display:flex; flex-direction:column; }
    .post-card { background:var(--surface); border:1px solid var(--border); border-bottom:none; padding:1rem 1.2rem; cursor:pointer; display:grid; grid-template-columns:1fr auto; gap:0.3rem 1rem; align-items:center; transition:background 0.15s; position:relative; }
    .post-card:first-child { border-radius:2px 2px 0 0; }
    .post-card:last-child { border-bottom:1px solid var(--border); border-radius:0 0 2px 2px; }
    .post-card:only-child { border-radius:2px; border-bottom:1px solid var(--border); }
    .post-card:hover { background:var(--surface2); }
    .post-card-thumb { width:48px; height:48px; object-fit:cover; border-radius:3px; border:1px solid var(--border); grid-column:2; grid-row:1/3; flex-shrink:0; }
    .post-title-text { font-size:0.93rem; font-weight:500; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .post-meta-row { font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--text-muted); display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap; }
    .post-date { font-family:'IBM Plex Mono',monospace; font-size:0.68rem; color:var(--border-dark); white-space:nowrap; }
    .badge { font-size:0.62rem; border-radius:2px; padding:0.1em 0.45em; border:1px solid; }
    .badge-anon { background:var(--surface2); border-color:var(--border); color:var(--border-dark); }
    .badge-member { background:#eef6ee; border-color:#b2d8b2; color:#2d6e2d; }
    .badge-img { background:#eef3ff; border-color:#b2c4f0; color:#2d4ea0; }
    .badge-gif { background:#fff8e0; border-color:#f0d060; color:#806000; }
    .admin-del-btn { position:absolute; top:50%; right:1rem; transform:translateY(-50%); background:var(--admin); color:#d4ffdf; border:none; padding:0.3rem 0.7rem; font-size:0.72rem; font-family:'Noto Sans KR',sans-serif; cursor:pointer; border-radius:2px; opacity:0; transition:opacity 0.15s; z-index:10; white-space:nowrap; }
    .post-card:hover .admin-del-btn { opacity:1; }

    /* ── 페이지네이션 ── */
    .pagination { display:flex; justify-content:center; align-items:center; gap:0.4rem; margin-top:1.5rem; flex-wrap:wrap; }
    .page-btn { background:var(--surface); border:1px solid var(--border); color:var(--text-muted); width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:2px; font-family:'IBM Plex Mono',monospace; font-size:0.82rem; transition:background 0.15s,border-color 0.15s,color 0.15s; }
    .page-btn:hover:not(:disabled) { background:var(--surface2); border-color:var(--border-dark); color:var(--text); }
    .page-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
    .page-btn:disabled { opacity:0.35; cursor:not-allowed; }

    /* ── 빈 상태 / 로딩 ── */
    .empty { text-align:center; padding:4rem 1rem; color:var(--text-muted); border:1px dashed var(--border); border-radius:2px; background:var(--surface); }
    .empty .icon { font-size:2rem; margin-bottom:0.5rem; }
    .loading { text-align:center; padding:3rem; color:var(--text-muted); font-family:'IBM Plex Mono',monospace; font-size:0.8rem; }
    .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:0.7rem; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── 게시글 모달 ── */
    .post-modal { background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--accent); border-radius:2px; max-width:660px; width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 20px 60px rgba(26,18,8,0.4); animation:modalUp 0.25s ease both; }
    .modal-header { padding:1.2rem 1.4rem 0.8rem; border-bottom:1px solid var(--border); }
    .modal-title { font-family:'Noto Serif KR',serif; font-size:1.2rem; font-weight:700; color:var(--ink); line-height:1.4; margin-bottom:0.5rem; }
    .modal-meta { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--text-muted); display:flex; gap:0.8rem; align-items:center; flex-wrap:wrap; }
    .modal-body { padding:1.2rem 1.4rem; font-size:0.9rem; line-height:1.9; color:var(--text); white-space:pre-wrap; min-height:60px; }
    .modal-gallery { padding:0 1.4rem 1.2rem; display:grid; gap:0.6rem; }
    .modal-gallery.count-1 { grid-template-columns:1fr; }
    .modal-gallery.count-2 { grid-template-columns:1fr 1fr; }
    .modal-gallery.count-3 { grid-template-columns:1fr 1fr 1fr; }
    .modal-gallery.count-4 { grid-template-columns:1fr 1fr; }
    .modal-gallery img { width:100%; max-height:360px; object-fit:contain; border-radius:3px; border:1px solid var(--border); cursor:zoom-in; transition:opacity 0.2s; background:var(--surface2); }
    .modal-gallery img:hover { opacity:0.88; }
    .modal-footer { padding:0.8rem 1.4rem; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:0.7rem; flex-wrap:wrap; }
    .btn-close { background:none; border:1px solid var(--border); padding:0.5rem 1.2rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; cursor:pointer; border-radius:2px; color:var(--text-muted); transition:border-color 0.2s,color 0.2s; }
    .btn-close:hover { border-color:var(--text-muted); color:var(--text); }
    .btn-del { background:none; border:1px solid var(--accent); color:var(--accent); padding:0.5rem 1.2rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; cursor:pointer; border-radius:2px; transition:background 0.2s,color 0.2s; }
    .btn-del:hover { background:var(--accent); color:#fff; }
    .btn-admin-del { background:var(--admin); color:#d4ffdf; border:none; padding:0.5rem 1.2rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; cursor:pointer; border-radius:2px; }
    .btn-admin-del:hover { background:var(--admin2); }
    .del-confirm { display:flex; align-items:center; gap:0.5rem; }
    .del-confirm input { width:140px; padding:0.45rem 0.7rem; font-size:0.82rem; }
    .btn-confirm { background:var(--accent); color:#fff; border:none; padding:0.47rem 0.9rem; font-size:0.82rem; font-family:'Noto Sans KR',sans-serif; cursor:pointer; border-radius:2px; white-space:nowrap; }

    /* ── 라이트박스 ── */
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.93); display:flex; align-items:center; justify-content:center; z-index:500; cursor:zoom-out; }
    .lightbox img { max-width:95vw; max-height:95vh; object-fit:contain; border-radius:3px; }

    /* ── 리셋 확인 ── */
    .confirm-box { background:var(--surface); border:1px solid var(--border); border-top:3px solid #b00000; border-radius:2px; width:100%; max-width:380px; padding:2rem; box-shadow:0 20px 60px rgba(26,18,8,0.4); animation:modalUp 0.25s ease both; text-align:center; }
    .confirm-box h2 { font-family:'Noto Serif KR',serif; font-size:1.1rem; font-weight:700; color:#7f0000; margin-bottom:0.7rem; }
    .confirm-box p { font-size:0.85rem; color:var(--text-muted); margin-bottom:1.4rem; line-height:1.6; }
    .confirm-btns { display:flex; gap:0.7rem; justify-content:center; }
    .btn-reset-ok { background:#b00000; color:#fff; border:none; padding:0.65rem 1.4rem; font-family:'Noto Sans KR',sans-serif; font-size:0.88rem; cursor:pointer; border-radius:2px; }
    .btn-reset-ok:hover { background:#e00000; }
    .btn-reset-ok:disabled { background:var(--border-dark); cursor:not-allowed; }
    .btn-reset-cancel { background:none; border:1px solid var(--border); color:var(--text-muted); padding:0.65rem 1.4rem; font-family:'Noto Sans KR',sans-serif; font-size:0.88rem; cursor:pointer; border-radius:2px; }

    /* ── 토스트 ── */
    .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--bg); padding:0.7rem 1.4rem; border-radius:2px; font-size:0.83rem; font-family:'IBM Plex Mono',monospace; opacity:0; transition:opacity 0.2s,transform 0.2s; z-index:400; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    footer { text-align:center; padding:2.5rem 1rem; font-family:'IBM Plex Mono',monospace; font-size:0.68rem; color:var(--border-dark); margin-top:3rem; }
  </style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, get, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKKqKYjNnJy0JsJ-kPZjk_P7Fupjeapfg",
  authDomain: "cozyboard-70215.firebaseapp.com",
  databaseURL: "https://cozyboard-70215-default-rtdb.firebaseio.com",
  projectId: "cozyboard-70215",
  storageBucket: "cozyboard-70215.firebasestorage.app",
  messagingSenderId: "344838094848",
  appId: "1:344838094848:web:1a4c3dac11db716e1898e5"
};

const ADMIN_EMAIL    = "altrofast11x2@email.com";
const POSTS_PER_PAGE = 10;
const MAX_IMAGES     = 4;
const MAX_SIZE_MB    = 2;

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

let currentUser  = null;
let currentPost  = null;
let pendingImages = []; // [{dataUrl, name, sizeKb, isGif}]
let allPosts     = [];
let currentPage  = 1;

const $ = id => document.getElementById(id);
const isAdmin = () => currentUser?.email === ADMIN_EMAIL;
const isGifFile = f => f.type === "image/gif";
const fmtKb = kb => kb >= 1024 ? (kb/1024).toFixed(1)+"MB" : kb+"KB";

/* ── 유틸 ── */
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function fmtDate(iso) {
  const d=new Date(iso), p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
let _tt;
function showToast(msg) {
  const el=$("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove("show"),2600);
}

/* ── 이미지 → Base64 변환 (리사이즈 포함) ── */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const isGif = file.type === "image/gif";
    // GIF는 리사이즈 없이 그대로
    if (isGif) {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
      return;
    }
    // 일반 이미지는 최대 1200px로 리사이즈 후 품질 0.82로 압축
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = reject;
    img.src = url;
  });
}

/* ── 파일 처리 ── */
async function processFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith("image/"));
  if (!arr.length) { showToast("이미지 파일만 첨부 가능해요"); return; }
  const remaining = MAX_IMAGES - pendingImages.length;
  if (remaining <= 0) { showToast(`최대 ${MAX_IMAGES}장까지 첨부 가능해요`); return; }
  const toProcess = arr.slice(0, remaining);

  for (const file of toProcess) {
    const sizeMb = file.size / 1024 / 1024;
    if (sizeMb > MAX_SIZE_MB) { showToast(`${file.name}: ${MAX_SIZE_MB}MB 이하 파일만 가능해요`); continue; }
    try {
      const dataUrl = await fileToBase64(file);
      const sizeKb  = Math.round(dataUrl.length * 0.75 / 1024);
      pendingImages.push({ dataUrl, name: file.name, sizeKb, isGif: isGifFile(file) });
    } catch(e) { showToast(`${file.name} 처리 중 오류가 발생했어요`); }
  }
  renderStrip();
}

/* ── 드래그앤드롭 존 ── */
const dropZone = $("dropZone");
const fileInput = $("fileInput");

dropZone.addEventListener("click", e => { if(e.target !== fileInput) fileInput.click(); });
fileInput.addEventListener("change", e => { processFiles(e.target.files); fileInput.value=""; });

dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", e => { if(!dropZone.contains(e.relatedTarget)) dropZone.classList.remove("drag-over"); });
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("drag-over");
  processFiles(e.dataTransfer.files);
});

/* ── 미리보기 스트립 렌더 ── */
function renderStrip() {
  const strip = $("imgStrip"); strip.innerHTML = "";
  pendingImages.forEach((img, i) => {
    const div = document.createElement("div"); div.className = "img-thumb";
    div.innerHTML = `
      <img src="${img.dataUrl}" alt="${img.name}" />
      ${img.isGif ? '<span class="gif-badge">GIF</span>' : ''}
      <span class="size-badge">${fmtKb(img.sizeKb)}</span>
      <button class="img-thumb-del" data-i="${i}" title="삭제">✕</button>
    `;
    strip.appendChild(div);
  });
  // 카운트 표시
  const label = $("imgCountLabel");
  label.textContent = pendingImages.length > 0
    ? `${pendingImages.length}/${MAX_IMAGES}장 선택됨`
    : "";
  // 드롭존 힌트 업데이트
  $("dropHint").textContent = pendingImages.length >= MAX_IMAGES
    ? `최대 ${MAX_IMAGES}장이 선택되었습니다`
    : `클릭하거나 이미지/GIF를 드래그해서 놓으세요`;
  dropZone.style.pointerEvents = pendingImages.length >= MAX_IMAGES ? "none" : "";
  dropZone.style.opacity       = pendingImages.length >= MAX_IMAGES ? "0.5" : "";

  strip.querySelectorAll(".img-thumb-del").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      pendingImages.splice(Number(btn.dataset.i), 1);
      renderStrip();
    });
  });
}

/* ══ 인증 모달 ══ */
let authMode = "login";
function openAuth(mode) {
  authMode = mode;
  $("authError").style.display = "none";
  $("authEmail").value=$("authPw").value=$("authNick").value="";
  const L = mode==="login";
  $("authTitle").textContent     = L ? "로그인" : "회원가입";

  $("authSwitchTxt").textContent = L ? "계정이 없으신가요?" : "이미 계정이 있으신가요?";
  $("authSwitchBtn").textContent = L ? "회원가입하기" : "로그인하기";
  $("authOverlay").style.display = "flex";
  setTimeout(()=>(L?$("authEmail"):$("authNick")).focus(), 50);
}
$("btnOpenLogin").addEventListener("click", ()=>openAuth("login"));
$("btnOpenReg").addEventListener("click",   ()=>openAuth("register"));
$("authClose").addEventListener("click",    ()=>{$("authOverlay").style.display="none";});
$("authOverlay").addEventListener("click",  e=>{if(e.target===$("authOverlay"))$("authOverlay").style.display="none";});
$("authSwitchBtn").addEventListener("click",()=>openAuth(authMode==="login"?"register":"login"));
["authNick","authEmail","authPw"].forEach(id=>{$(id).addEventListener("keydown",e=>{if(e.key==="Enter")$("authSubmit").click();});});

$("authSubmit").addEventListener("click", async()=>{
  const email=$("authEmail").value.trim(), pw=$("authPw").value.trim(), nick=$("authNick").value.trim();
  $("authError").style.display="none";
  if(!email||!pw){showAuthErr("이메일과 비밀번호를 입력해주세요.");return;}
  if(authMode==="register"&&!nick){showAuthErr("닉네임을 입력해주세요.");return;}
  if(authMode==="register"&&pw.length<6){showAuthErr("비밀번호는 6자 이상이어야 해요.");return;}
  const btn=$("authSubmit"); btn.disabled=true; btn.textContent="처리 중...";
  try {
    if(authMode==="register"){
      const cred=await createUserWithEmailAndPassword(auth,email,pw);
      await updateProfile(cred.user,{displayName:nick});
      showToast(`✅ 환영합니다, ${nick}님!`);
    } else {
      await signInWithEmailAndPassword(auth,email,pw);
      showToast("✅ 로그인 되었습니다");
    }
    $("authOverlay").style.display="none";
  } catch(e){showAuthErr(errMsg(e.code));}
  finally{btn.disabled=false; btn.textContent=authMode==="login"?"로그인":"가입하기";}
});
function showAuthErr(msg){$("authError").textContent=msg;$("authError").style.display="block";}
function errMsg(code){return({"auth/email-already-in-use":"이미 사용 중인 이메일이에요.","auth/invalid-email":"이메일 형식이 올바르지 않아요.","auth/weak-password":"비밀번호는 6자 이상이어야 해요.","auth/user-not-found":"존재하지 않는 계정이에요.","auth/wrong-password":"비밀번호가 틀렸어요.","auth/invalid-credential":"이메일 또는 비밀번호가 올바르지 않아요.","auth/too-many-requests":"잠시 후 다시 시도해주세요."})[code]||"오류가 발생했어요.";}
$("btnLogout").addEventListener("click", async()=>{await signOut(auth);showToast("로그아웃 되었습니다");});

/* ══ 글 작성 ══ */
$("btnSubmit").addEventListener("click", async()=>{
  const title=$("formTitle").value.trim(), content=$("formContent").value.trim();
  if(!title){showToast("제목을 입력해주세요");$("formTitle").focus();return;}
  if(!content){showToast("내용을 입력해주세요");$("formContent").focus();return;}
  let nickname, pwHash, uid;
  if(currentUser){
    nickname=currentUser.displayName||currentUser.email; pwHash=null; uid=currentUser.uid;
  } else {
    const nick=$("formNick").value.trim(), pw=$("formPw").value.trim();
    if(!nick){showToast("닉네임을 입력해주세요");$("formNick").focus();return;}
    if(!pw){showToast("삭제용 비밀번호를 입력해주세요");$("formPw").focus();return;}
    nickname=nick; pwHash=await sha256(pw); uid=null;
  }

  const btn=$("btnSubmit"); btn.disabled=true; btn.textContent="등록 중...";
  try {
    const images = pendingImages.length > 0
      ? pendingImages.map(i=>({dataUrl:i.dataUrl, isGif:i.isGif}))
      : null;
    await push(ref(db,"posts"), {
      nickname, title, content, pwHash, uid,
      images,
      createdAt: new Date().toISOString()
    });
    $("formNick").value=$("formPw").value=$("formTitle").value=$("formContent").value="";
    pendingImages=[]; renderStrip(); currentPage=1;
    showToast("✅ 게시글이 등록되었습니다");
    await loadPosts();
  } catch(e){
    if(e.message?.includes("exceeded")) showToast("❌ 이미지 용량이 너무 커요. 파일을 줄여주세요.");
    else showToast("❌ 등록 실패: "+e.message);
  }
  finally{btn.disabled=false; btn.textContent="✏️ 게시글 올리기";}
});
$("formContent").addEventListener("keydown",e=>{if(e.ctrlKey&&e.key==="Enter")$("btnSubmit").click();});

/* ══ 목록 로드 ══ */
async function loadPosts() {
  $("postList").innerHTML=`<div class="loading"><div class="spinner"></div><br/>불러오는 중...</div>`;
  try {
    const snap=await get(ref(db,"posts")), data=snap.val();
    if(!data){allPosts=[];renderPosts();return;}
    allPosts=Object.entries(data).map(([key,val])=>({key,...val})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    renderPosts();
  } catch(e){$("postList").innerHTML=`<div class="empty"><p>불러오기 실패: ${e.message}</p></div>`;}
}

/* ══ 렌더 + 페이지네이션 ══ */
function renderPosts() {
  if(!allPosts.length){
    $("postList").innerHTML=`<div class="empty"><div class="icon">📭</div><p>아직 게시글이 없어요. 첫 글을 남겨보세요!</p></div>`;
    $("postCount").textContent="0 posts";
    $("pagination").innerHTML=""; return;
  }
  const total=Math.ceil(allPosts.length/POSTS_PER_PAGE);
  if(currentPage>total) currentPage=total;
  const start=(currentPage-1)*POSTS_PER_PAGE;
  const pagePosts=allPosts.slice(start,start+POSTS_PER_PAGE);
  $("postCount").textContent=`${allPosts.length} posts`;
  $("postList").innerHTML="";

  pagePosts.forEach(post=>{
    const card=document.createElement("div"); card.className="post-card";
    const badgeHtml=post.uid?`<span class="badge badge-member">회원</span>`:`<span class="badge badge-anon">익명</span>`;
    const hasGif=post.images?.some(i=>i.isGif);
    const mediaLabel=post.images?.length?(hasGif?`<span class="badge badge-gif">🎞️ GIF</span>`:`<span class="badge badge-img">🖼️ ${post.images.length}</span>`):"";
    const thumb=post.images?.length
      ? `<img class="post-card-thumb" src="${post.images[0].dataUrl}" alt="썸네일"/>`
      : `<div style="grid-column:2;grid-row:1/3;width:48px"></div>`;
    card.innerHTML=`
      <div class="post-title-text"></div>
      ${thumb}
      <div class="post-meta-row"><span class="nick"></span>${badgeHtml}${mediaLabel}<span class="post-date"></span></div>
      ${isAdmin()?`<button class="admin-del-btn">🗑️ 삭제</button>`:""}
    `;
    card.querySelector(".post-title-text").textContent=post.title;
    card.querySelector(".nick").textContent=post.nickname;
    card.querySelector(".post-date").textContent=fmtDate(post.createdAt);
    const adb=card.querySelector(".admin-del-btn");
    if(adb){adb.addEventListener("click",async e=>{e.stopPropagation();if(!confirm(`"${post.title}" 삭제할까요?`))return;try{await remove(ref(db,`posts/${post.key}`));showToast("🗑️ 삭제됨");await loadPosts();}catch(e){showToast("❌ "+e.message);}});}
    card.addEventListener("click",()=>openPostModal(post));
    $("postList").appendChild(card);
  });

  // 페이지네이션
  const pg=$("pagination"); pg.innerHTML="";
  if(total<=1) return;
  const mk=(label,page,active,disabled)=>{
    const b=document.createElement("button");
    b.className="page-btn"+(active?" active":"");
    b.textContent=label; b.disabled=!!disabled;
    if(!disabled) b.addEventListener("click",()=>{currentPage=page;renderPosts();window.scrollTo({top:0,behavior:"smooth"});});
    return b;
  };
  pg.appendChild(mk("‹",currentPage-1,false,currentPage===1));
  let s=Math.max(1,currentPage-2), e=Math.min(total,s+4);
  if(e-s<4) s=Math.max(1,e-4);
  for(let i=s;i<=e;i++) pg.appendChild(mk(i,i,i===currentPage,false));
  pg.appendChild(mk("›",currentPage+1,false,currentPage===total));
}

/* ══ 게시글 모달 ══ */
function openPostModal(post) {
  currentPost=post;
  $("modalTitle").textContent=post.title;
  const badgeHtml=post.uid?`<span class="badge badge-member">회원</span>`:`<span class="badge badge-anon">익명</span>`;
  $("modalMeta").innerHTML=`<span class="n"></span>${badgeHtml}<span class="d"></span>`;
  $("modalMeta").querySelector(".n").textContent=post.nickname;
  $("modalMeta").querySelector(".d").textContent=fmtDate(post.createdAt);
  $("modalBody").textContent=post.content;

  const gallery=$("modalGallery"); gallery.innerHTML="";
  if(post.images?.length){
    const cnt=post.images.length;
    gallery.className=`modal-gallery count-${cnt}`;
    post.images.forEach(img=>{
      const el=document.createElement("img");
      el.src=img.dataUrl; el.alt="이미지";
      el.addEventListener("click",()=>openLightbox(img.dataUrl));
      gallery.appendChild(el);
    });
  }

  $("delSection").style.display="none"; $("delPwInput").value="";
  const isMyPost=currentUser&&currentUser.uid===post.uid;
  $("btnDel").style.display=(isMyPost||!post.uid)?"inline-block":"none";
  $("btnDel").dataset.direct=isMyPost?"1":"0";
  $("btnAdminDel").style.display=isAdmin()?"inline-block":"none";
  $("postOverlay").style.display="flex";
  document.body.style.overflow="hidden";
}
function closePostModal(){$("postOverlay").style.display="none";document.body.style.overflow="";currentPost=null;}
$("btnClosePost").addEventListener("click",closePostModal);
$("postOverlay").addEventListener("click",e=>{if(e.target===$("postOverlay"))closePostModal();});
$("btnDel").addEventListener("click",()=>{
  if($("btnDel").dataset.direct==="1"){if(confirm("정말 삭제하시겠어요?"))doDelete();}
  else{const s=$("delSection");s.style.display=s.style.display==="flex"?"none":"flex";if(s.style.display==="flex")$("delPwInput").focus();}
});
$("btnConfirmDel").addEventListener("click",async()=>{
  const input=$("delPwInput").value.trim();
  if(!input){showToast("비밀번호를 입력해주세요");return;}
  if(await sha256(input)!==currentPost.pwHash){showToast("❌ 비밀번호가 틀렸습니다");return;}
  doDelete();
});
$("btnAdminDel").addEventListener("click",()=>{if(confirm(`"${currentPost.title}" 삭제할까요?`))doDelete();});
async function doDelete(){
  try{await remove(ref(db,`posts/${currentPost.key}`));showToast("🗑️ 삭제되었습니다");closePostModal();await loadPosts();}
  catch(e){showToast("❌ 삭제 실패: "+e.message);}
}

$("btnReset").addEventListener("click",()=>{$("resetOverlay").style.display="flex";});
$("btnResetCancel").addEventListener("click",()=>{$("resetOverlay").style.display="none";});
$("btnResetOk").addEventListener("click",async()=>{

    <div class="write-footer">
      <button id="btnSubmit" class="btn-submit">✏️ 게시글 올리기</button>
      <span id="writeHint" class="write-hint">로그인하거나 익명으로 작성하세요</span>
    </div>
  </div>

  <div class="list-header">
    <div class="list-title">전체 글</div>
    <div id="postCount" class="post-count">loading...</div>
  </div>
  <div id="postList" class="post-list"></div>
  <div id="pagination" class="pagination"></div>
</main>

<!-- ══ 게시글 모달 ══ -->
<div id="postOverlay" class="overlay" style="display:none">
  <div class="post-modal">
    <div class="modal-header">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalMeta"  class="modal-meta"></div>
    </div>
    <div id="modalBody" class="modal-body"></div>
    <div id="modalGallery" class="modal-gallery"></div>
    <div class="modal-footer">
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
        <button id="btnAdminDel" class="btn-admin-del" style="display:none">👑 관리자 삭제</button>
        <button id="btnDel"      class="btn-del"       style="display:none">삭제</button>
        <div id="delSection" class="del-confirm" style="display:none">
          <input id="delPwInput" type="password" placeholder="삭제용 비밀번호" />
          <button id="btnConfirmDel" class="btn-confirm">확인</button>
        </div>
      </div>
      <button id="btnClosePost" class="btn-close">닫기</button>
    </div>
  </div>
</div>

<!-- ══ 전체 리셋 확인 ══ -->
<div id="resetOverlay" class="overlay" style="display:none">
  <div class="confirm-box">
    <h2>⚠️ 전체 게시글 삭제</h2>
    <p>모든 게시글이 <strong>영구적으로</strong> 삭제됩니다.<br/>이 작업은 되돌릴 수 없어요!</p>
    <div class="confirm-btns">
      <button id="btnResetCancel" class="btn-reset-cancel">취소</button>
      <button id="btnResetOk"     class="btn-reset-ok">전체 삭제</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<footer>CozyBoard Copyright By © kazinobel</footer>
</body>
</html>
